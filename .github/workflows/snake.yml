name: Generate Profile Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
    - main
    - master

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Cria a pasta dist caso não exista
      - name: Create dist directory
        run: mkdir -p dist

      # Gera a cobrinha e salva na pasta dist/
      - uses: Platane/snk@v3
        with:
          github_user_name: tronipm
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Gera os troféus e salva na pasta dist/
      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=tronipm&theme=transparent&no-frame=true&no-bg=true&row=2&column=4&margin-w=15&margin-h=15'
          path: 'dist/trophy.svg'

      # Envia todos os arquivos da pasta dist/ para a branch output
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
